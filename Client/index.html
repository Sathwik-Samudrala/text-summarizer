<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Text Summarizer — AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --border-hover: #3a3a5c;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --accent2: #f7c26a;
      --text: #eeedf5;
      --muted: #6b6a80;
      --card: #0f0f18;
      --positive: #5de8a0;
      --neutral: #f7c26a;
      --negative: #f76a6a;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(124,106,247,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 760px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,106,247,0.12);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent), #b07ef7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
      animation: fadeUp 0.5s ease both;
    }

    .card-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    textarea {
      width: 100%;
      min-height: 180px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      padding: 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea::placeholder { color: var(--muted); }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }

    .file-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: 1px dashed var(--border-hover);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .file-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #file-name {
      font-size: 12px;
      color: var(--muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #fileInput { display: none; }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      margin-top: 16px;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(124,106,247,0.4);
    }

    .submit-btn:active:not(:disabled) { transform: translateY(0); }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }
    .loading .btn-icon { display: none; }

    #results {
      display: none;
      animation: fadeUp 0.5s ease both;
    }

    #results.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .copy-btn.copied {
      border-color: var(--positive);
      color: var(--positive);
    }

    .result-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      margin-top: 14px;
    }

    .result-section-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .summary-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }

    .key-points {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .key-points li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }

    .key-points li::before {
      content: attr(data-num);
      min-width: 22px; height: 22px;
      background: rgba(124,106,247,0.15);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .sentiment-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      border: 1px solid;
    }

    .sentiment-pill.positive {
      background: rgba(93,232,160,0.1);
      border-color: rgba(93,232,160,0.3);
      color: var(--positive);
    }

    .sentiment-pill.neutral {
      background: rgba(247,194,106,0.1);
      border-color: rgba(247,194,106,0.3);
      color: var(--neutral);
    }

    .sentiment-pill.negative {
      background: rgba(247,106,106,0.1);
      border-color: rgba(247,106,106,0.3);
      color: var(--negative);
    }

    .sentiment-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 8px currentColor;
    }

    #error-box {
      display: none;
      background: rgba(247,106,106,0.08);
      border: 1px solid rgba(247,106,106,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--negative);
      font-size: 13px;
      margin-top: 14px;
      animation: fadeUp 0.3s ease both;
    }

    #error-box.visible { display: flex; gap: 10px; align-items: flex-start; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      margin-top: 48px;
      letter-spacing: 0.05em;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="badge">AI-Powered</div>
      <h1>Text <span>Summarizer</span></h1>
      <p class="subtitle">Paste any text → get a structured summary instantly</p>
    </header>

    <div class="card">
      <div class="card-label">Input Text</div>

      <textarea
        id="inputText"
        placeholder="Paste an article, meeting notes, report, or any block of text here..."
        spellcheck="false"
      ></textarea>

      <div class="char-count"><span id="charCount">0</span> characters</div>

      <div class="file-row">
        <button class="file-btn" onclick="document.getElementById('fileInput').click()">
          📄 Upload .txt file
        </button>
        <span id="file-name">No file chosen</span>
        <input type="file" id="fileInput" accept=".txt"/>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
        <div class="spinner"></div>
        <span class="btn-icon">✦</span>
        <span class="btn-text">Analyze Text</span>
      </button>
    </div>

    <div id="error-box">
      <span>⚠</span>
      <span id="error-msg"></span>
    </div>

    <div id="results">
      <div class="card">
        <div class="result-header">
          <div class="card-label" style="margin-bottom:0">Results</div>
          <button class="copy-btn" id="copyBtn" onclick="copyResults()">
            📋 Copy
          </button>
        </div>

        <div class="result-section">
          <div class="result-section-label">Summary</div>
          <div class="summary-text" id="summaryText"></div>
        </div>

        <div class="result-section">
          <div class="result-section-label">Key Points</div>
          <ul class="key-points" id="keyPointsList"></ul>
        </div>

        <div class="result-section">
          <div class="result-section-label">Sentiment</div>
          <div id="sentimentEl"></div>
        </div>
      </div>
    </div>

    <footer>Powered by OpenAI · text-summarizer v1.0</footer>
  </div>

  <script>
    const textarea = document.getElementById('inputText');
    const charCount = document.getElementById('charCount');
    const fileInput = document.getElementById('fileInput');
    const fileName  = document.getElementById('file-name');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox  = document.getElementById('error-box');
    const errorMsg  = document.getElementById('error-msg');
    const results   = document.getElementById('results');

    textarea.addEventListener('input', () => {
      charCount.textContent = textarea.value.length.toLocaleString();
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      fileName.textContent = file.name;
      const reader = new FileReader();
      reader.onload = (e) => {
        textarea.value = e.target.result;
        charCount.textContent = textarea.value.length.toLocaleString();
      };
      reader.readAsText(file);
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.add('visible');
      results.classList.remove('visible');
    }

    function hideError() {
      errorBox.classList.remove('visible');
    }

    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.classList.toggle('loading', on);
    }

    async function handleSubmit() {
      hideError();
      const text = textarea.value.trim();

      if (!text) {
        showError('Please paste some text or upload a .txt file before analyzing.');
        return;
      }
      if (text.length < 10) {
        showError('Text is too short. Please enter at least 10 characters.');
        return;
      }

      setLoading(true);
      results.classList.remove('visible');

      try {
        const res = await fetch('http://localhost:3000/api/summarize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || `Server error (${res.status})`);
        }

        renderResults(data);

      } catch (err) {
        if (err.message.includes('fetch')) {
          showError('Cannot reach the backend server. Make sure it is running on port 3000.');
        } else {
          showError(err.message);
        }
      } finally {
        setLoading(false);
      }
    }

    function renderResults({ summary, keyPoints, sentiment }) {
      document.getElementById('summaryText').textContent = summary;

      const ul = document.getElementById('keyPointsList');
      ul.innerHTML = '';
      keyPoints.forEach((point, i) => {
        const li = document.createElement('li');
        li.setAttribute('data-num', i + 1);
        li.textContent = point;
        ul.appendChild(li);
      });

      const icons = { positive: '↑', neutral: '→', negative: '↓' };
      const sentEl = document.getElementById('sentimentEl');
      sentEl.innerHTML = `
        <div class="sentiment-pill ${sentiment}">
          <span class="sentiment-dot"></span>
          ${icons[sentiment] || ''} ${sentiment.charAt(0).toUpperCase() + sentiment.slice(1)}
        </div>`;

      results.classList.add('visible');
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function copyResults() {
      const summary   = document.getElementById('summaryText').textContent;
      const points    = [...document.querySelectorAll('#keyPointsList li')].map((li, i) => `${i+1}. ${li.textContent}`).join('\n');
      const sentiment = document.querySelector('.sentiment-pill')?.textContent?.trim() || '';

      const text = `Summary:\n${summary}\n\nKey Points:\n${points}\n\nSentiment: ${sentiment}`;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✅ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '📋 Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    textarea.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') handleSubmit();
    });
  </script>
</body>
</html>
